services:
  - type: web
    name: sdt-backend
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --worker-class gthread --threads 4 --timeout 120 --max-requests 500 --max-requests-jitter 50
    healthCheckPath: /api/health/
